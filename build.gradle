apply plugin: 'java'

group "net.bdew.wurm"
version "0.9"

sourceCompatibility = JavaVersion.VERSION_1_8
targetCompatibility = JavaVersion.VERSION_1_8

repositories {
    mavenCentral()
    mavenLocal()
}

dependencies {
    // put these libs from game folder
    implementation files('libs/client-patched.jar')
    implementation files('libs/modlauncher.jar')
    implementation files('libs/javassist.jar')
}

jar {
    archiveName "${project.name}.jar"
}

task dist(type: Zip) {
    into("mods", {
        into(project.name, {
            from jar
        })
        from fileTree(dir: 'mods', include: '*')
    })

    archiveName "${project.name}-${project.version}.zip"
}
